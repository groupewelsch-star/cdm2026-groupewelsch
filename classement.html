<title>🏆 Classement CDM 2026 – Groupe Welsch</title>
<style>

  .nav-logo { font-size: 13px; font-weight: 700; color: #d4af37; }

  .podium-avatar { font-size: 22px; background: #1a2f50; border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; color: #fff; border: 2px solid #2a4a7a; }
  .podium-name { font-size: 11px; font-weight: 700; color: #e8edf5; text-align: center; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .podium-pts { font-size: 12px; font-weight: 700; color: #8ba0bf; }

  .podium-bar.p1 { background: linear-gradient(180deg, #d4af37, #b8942e); height: 80px; }
  .podium-bar.p2 { background: linear-gradient(180deg, #9aa0a8, #6b7280); height: 60px; }
  .podium-bar.p3 { background: linear-gradient(180deg, #cd7f32, #a0622a); height: 44px; }

  /* CLASSEMENT TABLE */
  .ranking-list { display: flex; flex-direction: column; gap: 8px; }
  .rank-row { display: flex; align-items: center; gap: 12px; background: #0f1e35; border: 1px solid #1e3356; border-radius: 12px; padding: 12px 16px; transition: background 0.2s; }

  .phase-section-chevron { font-size: 14px; color: #5a7a9a; transition: transform 0.2s; }

  .phase-section-body { display: none; padding-top: 8px; }

  .detail-sum-lbl { font-size: 10px; color: #5a7a9a; text-transform: uppercase; letter-spacing: 0.5px; }

  .sticky-header { position: sticky; top: 0; z-index: 50; }
  .stats-bar { display: flex; justify-content: center; gap: 20px; padding: 12px 20px; background: #0f1e35; border-bottom: 1px solid #1e3356; margin-bottom: 0; }

  .stat-val { font-size: 18px; font-weight: 900; color: #d4af37; }

<script>
const SUPABASE_URL = 'https://fafqylzoegiuvzqjfeea.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhZnF5bHpvZWdpdXZ6cWpmZWVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNzQxMDQsImV4cCI6MjA5Njc1MDEwNH0.T3YxIsSMTyVoXvcM2jq5cPWBPGuUVKY8Ss4vvLyLzd8';

let currentPhase = 'total';
let allPronostics = [];
let allResultats = {};

const GROUPS = [
  { letter:'A', matches:[
    {id:'A1',home:'Mexique',away:'Afrique du Sud'},{id:'A2',home:'Corée du Sud',away:'Tchéquie'},
    {id:'A3',home:'Tchéquie',away:'Afrique du Sud'},{id:'A4',home:'Mexique',away:'Corée du Sud'},
    {id:'A5',home:'Tchéquie',away:'Mexique'},{id:'A6',home:'Afrique du Sud',away:'Corée du Sud'}]},
  { letter:'B', matches:[
    {id:'B1',home:'Canada',away:'Bosnie'},{id:'B2',home:'Qatar',away:'Suisse'},
    {id:'B3',home:'Suisse',away:'Bosnie'},{id:'B4',home:'Canada',away:'Qatar'},
    {id:'B5',home:'Suisse',away:'Canada'},{id:'B6',home:'Bosnie',away:'Qatar'}]},
  { letter:'C', matches:[
    {id:'C1',home:'Brésil',away:'Maroc'},{id:'C2',home:'Haïti',away:'Écosse'},
    {id:'C3',home:'Écosse',away:'Maroc'},{id:'C4',home:'Brésil',away:'Haïti'},
    {id:'C5',home:'Écosse',away:'Brésil'},{id:'C6',home:'Maroc',away:'Haïti'}]},
  { letter:'D', matches:[
    {id:'D1',home:'États-Unis',away:'Paraguay'},{id:'D2',home:'Australie',away:'Turquie'},
    {id:'D3',home:'États-Unis',away:'Australie'},{id:'D4',home:'Turquie',away:'Paraguay'},
    {id:'D5',home:'Paraguay',away:'Australie'},{id:'D6',home:'Turquie',away:'États-Unis'}]},
  { letter:'E', matches:[
    {id:'E1',home:'Allemagne',away:'Curaçao'},{id:'E2',home:"Côte d'Ivoire",away:'Équateur'},
    {id:'E3',home:'Allemagne',away:"Côte d'Ivoire"},{id:'E4',home:'Équateur',away:'Curaçao'},
    {id:'E5',home:'Curaçao',away:"Côte d'Ivoire"},{id:'E6',home:'Équateur',away:'Allemagne'}]},
  { letter:'F', matches:[
    {id:'F1',home:'Pays-Bas',away:'Japon'},{id:'F2',home:'Suède',away:'Tunisie'},
    {id:'F3',home:'Pays-Bas',away:'Suède'},{id:'F4',home:'Tunisie',away:'Japon'},
    {id:'F5',home:'Japon',away:'Suède'},{id:'F6',home:'Tunisie',away:'Pays-Bas'}]},
  { letter:'G', matches:[
    {id:'G1',home:'Belgique',away:'Égypte'},{id:'G2',home:'Iran',away:'Nouvelle-Zélande'},
    {id:'G3',home:'Belgique',away:'Iran'},{id:'G4',home:'Nouvelle-Zélande',away:'Égypte'},
    {id:'G5',home:'Égypte',away:'Iran'},{id:'G6',home:'Nouvelle-Zélande',away:'Belgique'}]},
  { letter:'H', matches:[
    {id:'H1',home:'Espagne',away:'Cap-Vert'},{id:'H2',home:'Uruguay',away:'Arabie Saoudite'},
    {id:'H3',home:'Espagne',away:'Arabie Saoudite'},{id:'H4',home:'Uruguay',away:'Cap-Vert'},
    {id:'H5',home:'Cap-Vert',away:'Arabie Saoudite'},{id:'H6',home:'Uruguay',away:'Espagne'}]},
  { letter:'I', matches:[
    {id:'I1',home:'France',away:'Sénégal'},{id:'I2',home:'Irak',away:'Norvège'},
    {id:'I3',home:'France',away:'Irak'},{id:'I4',home:'Norvège',away:'Sénégal'},
    {id:'I5',home:'Norvège',away:'France'},{id:'I6',home:'Sénégal',away:'Irak'}]},
  { letter:'J', matches:[
    {id:'J1',home:'Argentine',away:'Algérie'},{id:'J2',home:'Autriche',away:'Jordanie'},
    {id:'J3',home:'Argentine',away:'Autriche'},{id:'J4',home:'Jordanie',away:'Algérie'},
    {id:'J5',home:'Algérie',away:'Autriche'},{id:'J6',home:'Jordanie',away:'Argentine'}]},
  { letter:'K', matches:[
    {id:'K1',home:'Portugal',away:'RD Congo'},{id:'K2',home:'Ouzbékistan',away:'Colombie'},
    {id:'K3',home:'Portugal',away:'Ouzbékistan'},{id:'K4',home:'Colombie',away:'RD Congo'},
    {id:'K5',home:'Colombie',away:'Portugal'},{id:'K6',home:'RD Congo',away:'Ouzbékistan'}]},
  { letter:'L', matches:[
    {id:'L1',home:'Angleterre',away:'Croatie'},{id:'L2',home:'Ghana',away:'Panama'},
    {id:'L3',home:'Angleterre',away:'Ghana'},{id:'L4',home:'Panama',away:'Croatie'},
    {id:'L5',home:'Panama',away:'Angleterre'},{id:'L6',home:'Croatie',away:'Ghana'}]}
];
let allScores = [];
let accuracyByEmail = {};

function setPhase(p) {
  currentPhase = p;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['total','1','2'][i] === p);
  });
  renderRanking();
}

async function loadClassement() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  try {
    // Load scores, pronostics and resultats in parallel
    const [resScores, resPronos, resResultats] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/scores?select=*&order=total_points.desc`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }),
      fetch(`${SUPABASE_URL}/rest/v1/pronostics?phase=eq.1`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }),
      fetch(`${SUPABASE_URL}/rest/v1/resultats`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } })
    ]);
    allScores = await resScores.json();
    const pronosticsData = await resPronos.json();
    const resultatsData = await resResultats.json();
    allPronostics = {};
    pronosticsData.forEach(p => { allPronostics[p.email] = p; });
    allResultats = {};
    resultatsData.forEach(r => { allResultats[r.match_id] = r; });

    // Compute accuracy (% bons pronostics) per participant — Phase 1 uniquement
    accuracyByEmail = {};
    window._totalBonsByEmail = {};
    pronosticsData.filter(p => (p.phase || 1) === 1).forEach(p => {
      const pronos = p.pronos || {};
      let nbJoues = 0, nbBons = 0;
      Object.keys(pronos).forEach(matchId => {
        const reel = allResultats[matchId];
        if (!reel || reel.home_score === null || reel.home_score === undefined) return;
        if ((reel.phase || 1) !== 1) return; // P1 only
        nbJoues++;
        const prono = pronos[matchId];
        const pH = prono.home !== '' && prono.home !== null ? parseInt(prono.home) : null;
        const pA = prono.away !== '' && prono.away !== null ? parseInt(prono.away) : null;
        const isExact = pH !== null && pA !== null && !isNaN(pH) && !isNaN(pA) && pH === reel.home_score && pA === reel.away_score;
        const isGoodResult = prono.result && prono.result === reel.result;
        if (isExact || isGoodResult) nbBons++;
      });
      accuracyByEmail[p.email] = nbJoues > 0 ? Math.round((nbBons / nbJoues) * 100) : 0;
      // Total bons résultats P1 (sera complété par P2+3+4 dans showDetail)
      window._totalBonsByEmail[p.email] = nbBons;
    });

    // Stats
    document.getElementById('statParticipants').textContent = allScores.length;
    const maxPts = allScores.length > 0 ? Math.max(...allScores.map(s => s.total_points)) : 0;
    document.getElementById('statLeader').textContent = maxPts + ' pts';

    // Résultats joués
    const resMatchs = await fetch(`${SUPABASE_URL}/rest/v1/resultats?select=id&home_score=not.is.null`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const matchsData = await resMatchs.json();
    document.getElementById('statMatchsJoues').textContent = Array.isArray(matchsData) ? matchsData.length : 0;

    const now = new Date();
    const dateStr = now.toLocaleDateString('fr-FR', {weekday:'long', day:'2-digit', month:'long'});
    const timeStr = now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('updateTime').textContent = dateStr + ' à ' + timeStr;
    document.getElementById('updateBanner').style.display = 'flex';
    document.getElementById('lastUpdate').textContent = '';

    renderRanking();
  } catch(e) {
    document.getElementById('rankingContainer').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>Erreur de chargement. Réessaie.</p></div>';
  }

  btn.classList.remove('spinning');
}

function renderRanking() {
  const container = document.getElementById('rankingContainer');

  if (!allScores.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>Aucun participant pour l\'instant.<br>Le classement apparaîtra dès les premiers pronostics.</p></div>';
    return;
  }

  let sorted = [...allScores];
  const acc = s => accuracyByEmail[s.email] || 0;
  const bons = s => window._totalBonsByEmail?.[s.email] || 0;
  if (currentPhase === '1') sorted.sort((a,b) => b.points_phase1 - a.points_phase1 || bons(b) - bons(a) || b.points_phase2 - a.points_phase2);
  else if (currentPhase === '2') sorted.sort((a,b) => b.points_phase2 - a.points_phase2 || bons(b) - bons(a) || b.points_phase2 - a.points_phase2);
  else sorted.sort((a,b) => b.total_points - a.total_points || bons(b) - bons(a) || b.points_phase2 - a.points_phase2);

  const getScore = s => currentPhase === '1' ? s.points_phase1 : currentPhase === '2' ? s.points_phase2 : s.total_points;
  const getInitials = name => name.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2);

  // PODIUM (top 3)
  let podiumHTML = '<div class="podium">';
  const podiumOrder = sorted.length >= 2 ? [sorted[1], sorted[0], sorted[2]].filter(Boolean) : sorted.slice(0,3);
  const posLabels = sorted.length >= 2 ? ['🥈','🥇','🥉'] : ['🥇','🥈','🥉'];
  const barClasses = sorted.length >= 2 ? ['p2','p1','p3'] : ['p1','p2','p3'];

  podiumOrder.forEach((s, i) => {
    if (!s) return;
    podiumHTML += `
      <div class="podium-item">
        <div class="podium-avatar">${getInitials(s.pseudo)}</div>
        <div class="podium-name">${s.pseudo}</div>
        <div class="podium-pts">${getScore(s)} pts</div>
        <div class="podium-accuracy">🎯 ${acc(s)}%</div>
        <div class="podium-bar ${barClasses[i]}">${posLabels[i]}</div>
      </div>`;
  });
  podiumHTML += '</div>';

  // LISTE complète
  let listHTML = '<div class="ranking-list">';
  sorted.forEach((s, i) => {
    const rank = i + 1;
    const numClass = rank===1?'top1':rank===2?'top2':rank===3?'top3':'';
    const rowClass = rank<=3?`rank-${rank}`:'';
    const pts = getScore(s);
    listHTML += `
      <div class="rank-row ${rowClass}" onclick="showDetail('${s.email}')">
        <div class="rank-num ${numClass}">${rank}</div>
        <div class="rank-pseudo">${s.pseudo}</div>
        <div class="rank-breakdown">
          <div class="rank-total">${pts} pts</div>
          <div class="rank-detail">${s.points_phase1}pts P1 · ${s.points_phase2}pts P2+3 <span class="rank-accuracy">🎯 ${acc(s)}%</span></div>
        </div>
        <div class="rank-chevron">›</div>
      </div>`;
  });
  listHTML += '</div>';

  container.innerHTML = podiumHTML + listHTML;
}

function buildMatchHTML(prono, reel, home, away, stats, phase, kickoff) {
  const now = new Date();
  const matchStarted = !kickoff || new Date(kickoff) <= now;
  const pronoH = (matchStarted && prono && prono.home !== '' && prono.home !== null) ? prono.home : (matchStarted ? '?' : '—');
  const pronoA = (matchStarted && prono && prono.away !== '' && prono.away !== null) ? prono.away : (matchStarted ? '?' : '—');
  const pronoScore = (matchStarted && (pronoH !== '—')) ? `${pronoH}-${pronoA}` : '—';
  const pronoRes = (matchStarted && prono) ? (prono.result || '?') : '—';
  let pts = 0, matchClass = 'pending', ptsClass = 'pending', ptsLabel = '⏳';
  let reelScore = '—';
  if (reel && reel.home_score !== null) {
    reelScore = `${reel.home_score}-${reel.away_score}`;
    const pH = parseInt(prono?.home), pA = parseInt(prono?.away);
    if (!isNaN(pH) && !isNaN(pA) && pH === reel.home_score && pA === reel.away_score) {
      pts = 3; matchClass = 'won3'; ptsClass = 'pts3'; ptsLabel = '+3'; stats.nb3++;
    } else if (prono?.result === reel.result) {
      pts = 1; matchClass = 'won1'; ptsClass = 'pts1'; ptsLabel = '+1'; stats.nb1++;
    } else {
      pts = 0; matchClass = 'lost'; ptsClass = 'pts0'; ptsLabel = '0'; stats.nb0++;
    }
    if (phase === 6) stats.pts2 = (stats.pts2 || 0) + pts;
    else if (phase === 4) stats.pts2_qf = (stats.pts2_qf || 0) + pts;
    else if (phase === 3) stats.pts2_8 = (stats.pts2_8 || 0) + pts;
    else if (phase === 2) stats.pts2_16 = (stats.pts2_16 || 0) + pts;
    else stats.pts1 = (stats.pts1 || 0) + pts;
  }
  return `<div class="detail-match ${matchClass}">
    <div class="detail-teams">${home} vs ${away}</div>
    <div class="detail-prono">${pronoScore} [${pronoRes}]</div>
    <div class="detail-reel">${reelScore}</div>
    <div class="detail-pts ${ptsClass}">${ptsLabel}</div>
  </div>`;
}

async function showDetail(email) {
  const participant = allPronostics[email];
  let scoreData = allScores.find(s => s.email === email);
  if (!scoreData && participant) scoreData = allScores.find(s => s.pseudo === participant.pseudo);
  if (!participant || !scoreData) { alert('Pronostics non disponibles pour ce participant.'); return; }

  // Load Phase 2 pronos
  let phase2Pronos = {}, phase3Pronos = {}, phase4Pronos = {}, phase6Pronos = {};
  try {
    const [res2, res3, res4, res6] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/pronostics?email=eq.${encodeURIComponent(email)}&phase=eq.2&select=pronos`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }),
      fetch(`${SUPABASE_URL}/rest/v1/pronostics?email=eq.${encodeURIComponent(email)}&phase=eq.3&select=pronos`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }),
      fetch(`${SUPABASE_URL}/rest/v1/pronostics?email=eq.${encodeURIComponent(email)}&phase=eq.4&select=pronos`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }),
      fetch(`${SUPABASE_URL}/rest/v1/pronostics?email=eq.${encodeURIComponent(email)}&phase=eq.6&select=pronos`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } })
    ]);
    const d2 = await res2.json();
    const d3 = await res3.json();
    const d4 = await res4.json();
    const d6 = await res6.json();
    if (d2.length) phase2Pronos = d2[0].pronos || {};
    if (d3.length) phase3Pronos = d3[0].pronos || {};
    if (d4.length) phase4Pronos = d4[0].pronos || {};
    if (d6.length) phase6Pronos = d6[0].pronos || {};
  } catch(e) {}

  const initials = scoreData.pseudo.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2);
  document.getElementById('detailAvatar').textContent = initials;
  document.getElementById('detailName').textContent = scoreData.pseudo;
  // pts2 and total computed after HTML generation below

  const pronos = participant.pronos || {};
  const stats = { nb3: 0, nb1: 0, nb0: 0, pts2: 0, pts2_8: 0, pts2_16: 0, pts2_qf: 0, pts1: 0 };
  // Per-phase stats for tab switching
  window._detailStats = { total: null, p1: null, p2: null };

  // === PHASE 6 - Demi-finales (ouvert par défaut) ===
  let p6HTML = '';
  MATCHES_P6.forEach(m => {
    const prono = phase6Pronos[m.id];
    const reel = allResultats[m.id];
    if (!prono && !reel) return;
    p6HTML += buildMatchHTML(prono, reel, m.home, m.away, stats, 6, m.kickoff);
  });

  // === PHASE 4 - Quarts (ouvert par défaut) ===
  let p4HTML = '';
  MATCHES_P4.forEach(m => {
    const prono = phase4Pronos[m.id];
    const reel = allResultats[m.id];
    if (!prono && !reel) return;
    p4HTML += buildMatchHTML(prono, reel, m.home, m.away, stats, 4, m.kickoff);
  });

  // === PHASE 3 - 8es (ouvert par défaut) ===
  let p3HTML = '';
  MATCHES_P3.forEach(m => {
    const prono = phase3Pronos[m.id];
    const reel = allResultats[m.id];
    if (!prono && !reel) return;
    p3HTML += buildMatchHTML(prono, reel, m.home, m.away, stats, 3, m.kickoff);
  });

  // === PHASE 2 - 16es (replié par défaut) ===
  let p2HTML = '';
  MATCHES_P2.forEach(m => {
    const prono = phase2Pronos[m.id];
    const reel = allResultats[m.id];
    if (!prono && !reel) return;
    p2HTML += buildMatchHTML(prono, reel, m.home, m.away, stats, 2, m.kickoff);
  });

  // === PHASE 1 (replié par défaut) ===
  let p1HTML = '';
  GROUPS.forEach(g => {
    let groupHTML = '';
    g.matches.forEach(m => {
      const prono = pronos[m.id];
      const reel = allResultats[m.id];
      if (!prono) return;
      groupHTML += buildMatchHTML(prono, reel, m.home, m.away, stats, 1, m.kickoff);
    });
    if (groupHTML) {
      p1HTML += `<div class="detail-group">
        <div class="detail-group-title"><div class="detail-group-letter">${g.letter}</div>Groupe ${g.letter}</div>
        ${groupHTML}
      </div>`;
    }
  });

  let bodyHTML = '';
  // Phase 2 section (open)
  if (p6HTML) {
    bodyHTML += `<div class="phase-section">
      <div class="phase-section-header phase2" onclick="toggleSection('p6section')">
        <div><div class="phase-section-title">⚔️ Demi-finales</div><div class="phase-section-pts">${stats.pts2} pts</div></div>
        <span class="phase-section-chevron open" id="chevron_p6section">›</span>
      </div>
      <div class="phase-section-body open" id="p6section">${p6HTML}</div>
    </div>`;
  }
  if (p4HTML) {
    bodyHTML += `<div class="phase-section">
      <div class="phase-section-header phase2" onclick="toggleSection('p4section')">
        <div><div class="phase-section-title">🏆 Quarts de finale</div><div class="phase-section-pts">${stats.pts2_qf || 0} pts</div></div>
        <span class="phase-section-chevron" id="chevron_p4section">›</span>
      </div>
      <div class="phase-section-body" id="p4section">${p4HTML}</div>
    </div>`;
  }
  if (p3HTML) {
    bodyHTML += `<div class="phase-section">
      <div class="phase-section-header phase2" onclick="toggleSection('p3section')">
        <div><div class="phase-section-title">🔥 8es de finale</div><div class="phase-section-pts">${stats.pts2_8} pts</div></div>
        <span class="phase-section-chevron" id="chevron_p3section">›</span>
      </div>
      <div class="phase-section-body" id="p3section">${p3HTML}</div>
    </div>`;
  }
  if (p2HTML) {
    bodyHTML += `<div class="phase-section">
      <div class="phase-section-header phase2" onclick="toggleSection('p2section')">
        <div><div class="phase-section-title">⚡ 16es de finale</div><div class="phase-section-pts">${stats.pts2_16} pts</div></div>
        <span class="phase-section-chevron" id="chevron_p2section">›</span>
      </div>
      <div class="phase-section-body" id="p2section">${p2HTML}</div>
    </div>`;
  }

  // Phase 1 section (collapsed by default)
  if (p1HTML) {
    bodyHTML += `<div class="phase-section">
      <div class="phase-section-header" onclick="toggleSection('p1section')">
        <div><div class="phase-section-title">⚽ Phase de poules</div><div class="phase-section-pts">${stats.pts1} pts</div></div>
        <span class="phase-section-chevron" id="chevron_p1section">›</span>
      </div>
      <div class="phase-section-body" id="p1section">${p1HTML}</div>
    </div>`;
  }

  document.getElementById('detailBody').innerHTML = bodyHTML || '<p style="color:#5a7a9a;font-size:13px;padding:10px">Aucun pronostic trouvé.</p>';
  const computedP234 = stats.pts2 + (stats.pts2_qf||0) + stats.pts2_8 + stats.pts2_16;
  const computedTotal = stats.pts1 + computedP234;
  document.getElementById('detailScore').textContent = `${computedTotal} pts total · ${stats.pts1} pts P1 · ${computedP234} pts P2+3+4`;

  // Build per-phase body sections
  window._detailBodyP1 = p1HTML ? `<div class="phase-section"><div class="phase-section-header" onclick="toggleSection('p1only')"><div><div class="phase-section-title">⚽ Phase de poules</div><div class="phase-section-pts">${stats.pts1} pts</div></div><span class="phase-section-chevron open" id="chevron_p1only">›</span></div><div class="phase-section-body open" id="p1only">${p1HTML}</div></div>` : '';
  window._detailBodyP2 = (p6HTML ? `<div class="phase-section"><div class="phase-section-header phase2" onclick="toggleSection('p6only')"><div><div class="phase-section-title">⚔️ Demi-finales</div><div class="phase-section-pts">${stats.pts2} pts</div></div><span class="phase-section-chevron open" id="chevron_p6only">›</span></div><div class="phase-section-body open" id="p6only">${p6HTML}</div></div>` : '') +
    (p4HTML ? `<div class="phase-section"><div class="phase-section-header phase2" onclick="toggleSection('p4only')"><div><div class="phase-section-title">🏆 Quarts de finale</div><div class="phase-section-pts">${stats.pts2_qf||0} pts</div></div><span class="phase-section-chevron open" id="chevron_p4only">›</span></div><div class="phase-section-body open" id="p4only">${p4HTML}</div></div>` : '') +
    (p3HTML ? `<div class="phase-section"><div class="phase-section-header phase2" onclick="toggleSection('p3only')"><div><div class="phase-section-title">🔥 8es de finale</div><div class="phase-section-pts">${stats.pts2_8} pts</div></div><span class="phase-section-chevron open" id="chevron_p3only">›</span></div><div class="phase-section-body open" id="p3only">${p3HTML}</div></div>` : '') +
    (p2HTML ? `<div class="phase-section"><div class="phase-section-header phase2" onclick="toggleSection('p2only')"><div><div class="phase-section-title">⚡ 16es de finale</div><div class="phase-section-pts">${stats.pts2_16} pts</div></div><span class="phase-section-chevron open" id="chevron_p2only">›</span></div><div class="phase-section-body open" id="p2only">${p2HTML}</div></div>` : '');
  window._detailBodyTotal = bodyHTML;

  // Per-phase stats for tab switching
  // We need separate stats - build them from the already computed stats
  window._detailStats = {
    total: { nb3: stats.nb3, nb1: stats.nb1, nb0: stats.nb0, pts: computedTotal },
    p1: { nb3: 0, nb1: 0, nb0: 0, pts: stats.pts1 },
    p2: { nb3: 0, nb1: 0, nb0: 0, pts: computedP234 }
  };
  // Recompute p1 stats separately
  const statsP1 = { nb3:0, nb1:0, nb0:0 };
  GROUPS.forEach(g => g.matches.forEach(m => {
    const prono = pronos[m.id], reel = allResultats[m.id];
    if (!prono || !reel || reel.home_score === null) return;
    const pH = parseInt(prono.home), pA = parseInt(prono.away);
    if (!isNaN(pH) && !isNaN(pA) && pH === reel.home_score && pA === reel.away_score) statsP1.nb3++;
    else if (prono.result === reel.result) statsP1.nb1++;
    else statsP1.nb0++;
  }));
  window._detailStats.p1 = { nb3: statsP1.nb3, nb1: statsP1.nb1, nb0: statsP1.nb0, pts: stats.pts1 };
  window._detailStats.p2 = { nb3: stats.nb3 - statsP1.nb3, nb1: stats.nb1 - statsP1.nb1, nb0: stats.nb0 - statsP1.nb0, pts: computedP234 };

  switchDetailTab('total');

  document.getElementById('detailOverlay').classList.add('open');
}

function switchDetailTab(tab) {
  ['total','p1','p2'].forEach(t => {
    document.getElementById('dtab_'+t)?.classList.toggle('active', t === tab);
  });
  const s = window._detailStats[tab];
  const body = tab === 'p1' ? window._detailBodyP1 : tab === 'p2' ? window._detailBodyP2 : window._detailBodyTotal;
  document.getElementById('detailBody').innerHTML = body || '<p style="color:#5a7a9a;font-size:13px;padding:10px">Aucun pronostic.</p>';
  document.getElementById('detailSummary').innerHTML = `
    <div class="detail-sum-item"><div class="detail-sum-val" style="color:#d4af37">${s.nb3}</div><div class="detail-sum-lbl">Scores exacts</div></div>
    <div class="detail-sum-item"><div class="detail-sum-val" style="color:#2ea55a">${s.nb1}</div><div class="detail-sum-lbl">Bons résultats</div></div>
    <div class="detail-sum-item"><div class="detail-sum-val" style="color:#3a5a7a">${s.nb0}</div><div class="detail-sum-lbl">Ratés</div></div>
    <div class="detail-sum-item"><div class="detail-sum-val">${s.pts}</div><div class="detail-sum-lbl">Points</div></div>`;
}

function toggleSection(id) {
  const body = document.getElementById(id);
  const chevron = document.getElementById('chevron_' + id);
  body.classList.toggle('open');
  chevron.classList.toggle('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
}

loadClassement();
setInterval(loadClassement, 5 * 60 * 1000);
document.getElementById('detailOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});
