<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Classement CDM 2026 – Groupe Welsch</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .nav-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: #070f1e; border-bottom: 1px solid #1e3356; }
  .nav-logo { font-size: 13px; font-weight: 700; color: #d4af37; }
  .nav-menu-btn { display: flex; align-items: center; gap: 6px; background: #1a2f50; border: 1px solid #2a4a7a; color: #8ba0bf; font-size: 12px; font-weight: 600; border-radius: 20px; padding: 7px 14px; text-decoration: none; -webkit-tap-highlight-color: transparent; }
  .nav-menu-btn:active { opacity: 0.75; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a1628; color: #e8edf5; min-height: 100vh; }

  .hero { background: linear-gradient(135deg, #0a1628 0%, #1a3a6b 50%, #0a1628 100%); border-bottom: 3px solid #d4af37; padding: 24px 20px 18px; text-align: center; }
  .hero-badge { display: inline-block; background: #d4af37; color: #0a1628; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 4px 14px; border-radius: 20px; margin-bottom: 8px; }
  .hero-brand { font-size: clamp(20px, 5vw, 28px); font-weight: 900; color: #fff; margin-bottom: 2px; }
  .hero h1 { font-size: 13px; color: #8ba0bf; }
  .last-update { font-size: 11px; color: #5a7a9a; margin-top: 6px; }

  .update-banner { display: flex; align-items: center; justify-content: center; gap: 8px; background: #0a1628; border: 1px solid #1e3356; border-radius: 10px; margin: 12px 16px 0; padding: 9px 16px; font-size: 12px; color: #8ba0bf; }
  .update-dot { width: 7px; height: 7px; border-radius: 50%; background: #2ea55a; flex-shrink: 0; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .update-time { font-weight: 700; color: #d4af37; }

  .phase-tabs { display: flex; justify-content: center; gap: 8px; padding: 14px 20px; background: #0f1e35; border-bottom: 1px solid #1e3356; }
  .tab { background: #1a2f50; border: 1px solid #2a4a7a; color: #8ba0bf; font-size: 13px; font-weight: 600; border-radius: 20px; padding: 6px 18px; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
  .tab.active { background: #d4af37; border-color: #d4af37; color: #0a1628; }

  .content { max-width: 500px; margin: 0 auto; padding: 16px; }

  /* PODIUM */
  .podium { display: flex; align-items: flex-end; justify-content: center; gap: 8px; margin-bottom: 24px; }
  .podium-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .podium-avatar { font-size: 22px; background: #1a2f50; border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; color: #fff; border: 2px solid #2a4a7a; }
  .podium-name { font-size: 11px; font-weight: 700; color: #e8edf5; text-align: center; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .podium-pts { font-size: 12px; font-weight: 700; color: #8ba0bf; }
  .podium-bar { border-radius: 6px 6px 0 0; width: 72px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .podium-bar.p1 { background: linear-gradient(180deg, #d4af37, #b8942e); height: 80px; }
  .podium-bar.p2 { background: linear-gradient(180deg, #9aa0a8, #6b7280); height: 60px; }
  .podium-bar.p3 { background: linear-gradient(180deg, #cd7f32, #a0622a); height: 44px; }

  /* CLASSEMENT TABLE */
  .ranking-list { display: flex; flex-direction: column; gap: 8px; }
  .rank-row { display: flex; align-items: center; gap: 12px; background: #0f1e35; border: 1px solid #1e3356; border-radius: 12px; padding: 12px 16px; transition: background 0.2s; }
  .rank-row.rank-1 { border-color: #d4af37; background: linear-gradient(90deg, rgba(212,175,55,0.08), #0f1e35); }
  .rank-row.rank-2 { border-color: #6b7280; }
  .rank-row.rank-3 { border-color: #cd7f32; }
  .rank-num { font-size: 16px; font-weight: 900; color: #3a5a7a; min-width: 28px; text-align: center; }
  .rank-num.top1 { color: #d4af37; }
  .rank-num.top2 { color: #9aa0a8; }
  .rank-num.top3 { color: #cd7f32; }
  .rank-pseudo { flex: 1; font-size: 15px; font-weight: 700; color: #fff; }
  .rank-breakdown { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .rank-total { font-size: 18px; font-weight: 900; color: #d4af37; }
  .rank-detail { font-size: 10px; color: #5a7a9a; }

  /* PHASE BADGES */
  .phase-badge { display: inline-block; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
  .phase-badge.p1 { background: rgba(29,158,117,0.2); color: #7fdc9f; border: 1px solid rgba(29,158,117,0.3); }
  .phase-badge.p2 { background: rgba(212,175,55,0.2); color: #d4af37; border: 1px solid rgba(212,175,55,0.3); }

  .empty-state { text-align: center; padding: 40px 20px; color: #3a5a7a; }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  .loading { text-align: center; padding: 40px; color: #5a7a9a; }
  .spinner { width: 32px; height: 32px; border: 3px solid #1e3356; border-top-color: #d4af37; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .refresh-btn { position: fixed; bottom: 20px; right: 20px; background: #d4af37; color: #0a1628; border: none; border-radius: 50%; width: 48px; height: 48px; font-size: 20px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.4); z-index: 100; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: center; }
  .refresh-btn.spinning { animation: spin 0.8s linear infinite; }

  .ext-links {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 12px 16px;
    background: #0a1628;
    border-bottom: 1px solid #1e3356;
    flex-wrap: wrap;
  }
  .ext-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #0f1e35;
    border: 1px solid #2a4a7a;
    color: #8ba0bf;
    font-size: 12px;
    font-weight: 600;
    border-radius: 20px;
    padding: 7px 14px;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.2s;
  }
  .ext-btn:active { opacity: 0.75; }
  .ext-btn.primary { background: #1a3a6b; border-color: #2a5a9b; color: #7fafd9; }

  /* DETAIL MODAL */
  .rank-row { cursor: pointer; }
  .rank-row:active { background: #162b47 !important; }
  .rank-chevron { font-size: 14px; color: #3a5a7a; flex-shrink: 0; }

  .detail-overlay { display: none; position: fixed; inset: 0; background: rgba(5,12,25,0.95); z-index: 200; overflow-y: auto; padding: 16px; }
  .detail-overlay.open { display: block; }
  .detail-modal { background: #0f1e35; border: 2px solid #d4af37; border-radius: 16px; max-width: 560px; margin: 0 auto; overflow: hidden; }
  .detail-header { background: linear-gradient(135deg, #0a1628, #1a3a6b); padding: 20px; display: flex; align-items: center; gap: 14px; border-bottom: 2px solid #d4af37; }
  .detail-avatar { background: #d4af37; color: #0a1628; font-weight: 900; font-size: 18px; width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .detail-name { font-size: 20px; font-weight: 900; color: #fff; }
  .detail-score { font-size: 13px; color: #8ba0bf; margin-top: 2px; }
  .detail-close { margin-left: auto; background: #1a2f50; border: 1px solid #2a4a7a; color: #8ba0bf; border-radius: 8px; width: 34px; height: 34px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .detail-body { padding: 16px; }
  .detail-group { margin-bottom: 16px; }
  .detail-group-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #5a7a9a; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .detail-group-letter { background: #d4af37; color: #0a1628; font-weight: 900; font-size: 10px; width: 20px; height: 20px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .detail-match { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; background: #0a1628; border: 1px solid #162b47; }
  .detail-match.won3 { border-color: #d4af37; background: rgba(212,175,55,0.07); }
  .detail-match.won1 { border-color: #2ea55a; background: rgba(46,165,90,0.07); }
  .detail-match.lost { border-color: #1e3356; opacity: 0.6; }
  .detail-match.pending { border-color: #1e3356; }

  .detail-teams { flex: 1; font-size: 12px; font-weight: 600; color: #dce8f5; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .detail-prono { font-size: 12px; font-weight: 700; color: #8ba0bf; flex-shrink: 0; min-width: 40px; text-align: center; }
  .detail-reel { font-size: 11px; color: #5a7a9a; flex-shrink: 0; min-width: 40px; text-align: center; }
  .detail-pts { font-size: 13px; font-weight: 900; flex-shrink: 0; min-width: 36px; text-align: right; }
  .detail-pts.pts3 { color: #d4af37; }
  .detail-pts.pts1 { color: #2ea55a; }
  .detail-pts.pts0 { color: #3a5a7a; }
  .detail-pts.pending { color: #3a5a7a; font-size: 10px; }

  .detail-summary { display: flex; justify-content: space-around; padding: 14px; background: #0a1628; border-top: 1px solid #1e3356; margin-top: 4px; }
  .detail-sum-item { text-align: center; }
  .detail-sum-val { font-size: 20px; font-weight: 900; color: #d4af37; }
  .detail-sum-lbl { font-size: 10px; color: #5a7a9a; text-transform: uppercase; letter-spacing: 0.5px; }

  .stats-bar { display: flex; justify-content: center; gap: 20px; padding: 12px 20px; background: #0f1e35; border-bottom: 1px solid #1e3356; margin-bottom: 0; }
  .stat { text-align: center; }
  .stat-val { font-size: 18px; font-weight: 900; color: #d4af37; }
  .stat-lbl { font-size: 10px; color: #5a7a9a; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>

<div class="nav-bar">
  <div class="nav-logo">🏆 CDM 2026</div>
  <a class="nav-menu-btn" href="index.html">☰ Menu</a>
</div>
<div class="hero">
  <div class="hero-badge">🏆 Classement en direct</div>

  <h1>Coupe du Monde 2026</h1>
  <div class="last-update" id="lastUpdate">Chargement...</div>
</div>

<div class="update-banner" id="updateBanner" style="display:none"><div class="update-dot"></div><span>Dernière mise à jour du classement : <span class="update-time" id="updateTime"></span></span></div>

<div class="ext-links">
  <a class="ext-btn primary" href="https://www.flashscore.fr/football/monde/championnat-du-monde/" target="_blank">⚽ Scores live · Flashscore</a>
  <a class="ext-btn" href="https://www.footmercato.net/international/coupe-du-monde/calendrier/" target="_blank">📅 Calendrier · Footmercato</a>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-val" id="statParticipants">—</div><div class="stat-lbl">Participants</div></div>
  <div class="stat"><div class="stat-val" id="statMatchsJoues">—</div><div class="stat-lbl">Matchs joués</div></div>
  <div class="stat"><div class="stat-val" id="statLeader">—</div><div class="stat-lbl">Meilleur score</div></div>
</div>

<div class="phase-tabs">
  <button class="tab active" onclick="setPhase('total')">🌍 Total</button>
  <button class="tab" onclick="setPhase('1')">Phase 1</button>
  <button class="tab" onclick="setPhase('2')">Phase 2</button>
</div>

<div class="content">
  <div id="rankingContainer"><div class="loading"><div class="spinner"></div><p>Chargement du classement...</p></div></div>
</div>

<!-- DETAIL MODAL -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-modal">
    <div class="detail-header">
      <div class="detail-avatar" id="detailAvatar"></div>
      <div>
        <div class="detail-name" id="detailName"></div>
        <div class="detail-score" id="detailScore"></div>
      </div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
    <div class="detail-summary" id="detailSummary"></div>
  </div>
</div>

<button class="refresh-btn"  id="refreshBtn" onclick="loadClassement()" title="Actualiser">↻</button>

<script>
const SUPABASE_URL = 'https://fafqylzoegiuvzqjfeea.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhZnF5bHpvZWdpdXZ6cWpmZWVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNzQxMDQsImV4cCI6MjA5Njc1MDEwNH0.T3YxIsSMTyVoXvcM2jq5cPWBPGuUVKY8Ss4vvLyLzd8';

let currentPhase = 'total';
let allPronostics = [];
let allResultats = {};

const GROUPS = [
  { letter:'A', matches:[
    {id:'A1',home:'Mexique',away:'Afrique du Sud'},{id:'A2',home:'Corée du Sud',away:'Tchéquie'},
    {id:'A3',home:'Tchéquie',away:'Afrique du Sud'},{id:'A4',home:'Mexique',away:'Corée du Sud'},
    {id:'A5',home:'Tchéquie',away:'Mexique'},{id:'A6',home:'Afrique du Sud',away:'Corée du Sud'}]},
  { letter:'B', matches:[
    {id:'B1',home:'Canada',away:'Bosnie'},{id:'B2',home:'Qatar',away:'Suisse'},
    {id:'B3',home:'Suisse',away:'Bosnie'},{id:'B4',home:'Canada',away:'Qatar'},
    {id:'B5',home:'Suisse',away:'Canada'},{id:'B6',home:'Bosnie',away:'Qatar'}]},
  { letter:'C', matches:[
    {id:'C1',home:'Brésil',away:'Maroc'},{id:'C2',home:'Haïti',away:'Écosse'},
    {id:'C3',home:'Écosse',away:'Maroc'},{id:'C4',home:'Brésil',away:'Haïti'},
    {id:'C5',home:'Écosse',away:'Brésil'},{id:'C6',home:'Maroc',away:'Haïti'}]},
  { letter:'D', matches:[
    {id:'D1',home:'États-Unis',away:'Paraguay'},{id:'D2',home:'Australie',away:'Turquie'},
    {id:'D3',home:'États-Unis',away:'Australie'},{id:'D4',home:'Turquie',away:'Paraguay'},
    {id:'D5',home:'Paraguay',away:'Australie'},{id:'D6',home:'Turquie',away:'États-Unis'}]},
  { letter:'E', matches:[
    {id:'E1',home:'Allemagne',away:'Curaçao'},{id:'E2',home:"Côte d'Ivoire",away:'Équateur'},
    {id:'E3',home:'Allemagne',away:"Côte d'Ivoire"},{id:'E4',home:'Équateur',away:'Curaçao'},
    {id:'E5',home:'Curaçao',away:"Côte d'Ivoire"},{id:'E6',home:'Équateur',away:'Allemagne'}]},
  { letter:'F', matches:[
    {id:'F1',home:'Pays-Bas',away:'Japon'},{id:'F2',home:'Suède',away:'Tunisie'},
    {id:'F3',home:'Pays-Bas',away:'Suède'},{id:'F4',home:'Tunisie',away:'Japon'},
    {id:'F5',home:'Japon',away:'Suède'},{id:'F6',home:'Tunisie',away:'Pays-Bas'}]},
  { letter:'G', matches:[
    {id:'G1',home:'Belgique',away:'Égypte'},{id:'G2',home:'Iran',away:'Nouvelle-Zélande'},
    {id:'G3',home:'Belgique',away:'Iran'},{id:'G4',home:'Nouvelle-Zélande',away:'Égypte'},
    {id:'G5',home:'Égypte',away:'Iran'},{id:'G6',home:'Nouvelle-Zélande',away:'Belgique'}]},
  { letter:'H', matches:[
    {id:'H1',home:'Espagne',away:'Cap-Vert'},{id:'H2',home:'Uruguay',away:'Arabie Saoudite'},
    {id:'H3',home:'Espagne',away:'Arabie Saoudite'},{id:'H4',home:'Uruguay',away:'Cap-Vert'},
    {id:'H5',home:'Cap-Vert',away:'Arabie Saoudite'},{id:'H6',home:'Uruguay',away:'Espagne'}]},
  { letter:'I', matches:[
    {id:'I1',home:'France',away:'Sénégal'},{id:'I2',home:'Irak',away:'Norvège'},
    {id:'I3',home:'France',away:'Irak'},{id:'I4',home:'Norvège',away:'Sénégal'},
    {id:'I5',home:'Norvège',away:'France'},{id:'I6',home:'Sénégal',away:'Irak'}]},
  { letter:'J', matches:[
    {id:'J1',home:'Argentine',away:'Algérie'},{id:'J2',home:'Autriche',away:'Jordanie'},
    {id:'J3',home:'Argentine',away:'Autriche'},{id:'J4',home:'Jordanie',away:'Algérie'},
    {id:'J5',home:'Algérie',away:'Autriche'},{id:'J6',home:'Jordanie',away:'Argentine'}]},
  { letter:'K', matches:[
    {id:'K1',home:'Portugal',away:'RD Congo'},{id:'K2',home:'Ouzbékistan',away:'Colombie'},
    {id:'K3',home:'Portugal',away:'Ouzbékistan'},{id:'K4',home:'Colombie',away:'RD Congo'},
    {id:'K5',home:'Colombie',away:'Portugal'},{id:'K6',home:'RD Congo',away:'Ouzbékistan'}]},
  { letter:'L', matches:[
    {id:'L1',home:'Angleterre',away:'Croatie'},{id:'L2',home:'Ghana',away:'Panama'},
    {id:'L3',home:'Angleterre',away:'Ghana'},{id:'L4',home:'Panama',away:'Croatie'},
    {id:'L5',home:'Panama',away:'Angleterre'},{id:'L6',home:'Croatie',away:'Ghana'}]}
];
let allScores = [];

function setPhase(p) {
  currentPhase = p;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['total','1','2'][i] === p);
  });
  renderRanking();
}

async function loadClassement() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  try {
    // Load scores, pronostics and resultats in parallel
    const [resScores, resPronos, resResultats] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/scores?select=*&order=total_points.desc`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }),
      fetch(`${SUPABASE_URL}/rest/v1/pronostics`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }),
      fetch(`${SUPABASE_URL}/rest/v1/resultats`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } })
    ]);
    allScores = await resScores.json();
    const pronosticsData = await resPronos.json();
    const resultatsData = await resResultats.json();
    allPronostics = {};
    pronosticsData.forEach(p => { allPronostics[p.email] = p; });
    allResultats = {};
    resultatsData.forEach(r => { allResultats[r.match_id] = r; });



    // Stats
    document.getElementById('statParticipants').textContent = allScores.length;
    const maxPts = allScores.length > 0 ? Math.max(...allScores.map(s => s.total_points)) : 0;
    document.getElementById('statLeader').textContent = maxPts + ' pts';

    // Résultats joués
    const resMatchs = await fetch(`${SUPABASE_URL}/rest/v1/resultats?select=id&home_score=not.is.null`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const matchsData = await resMatchs.json();
    document.getElementById('statMatchsJoues').textContent = Array.isArray(matchsData) ? matchsData.length : 0;

    const now = new Date();
    const dateStr = now.toLocaleDateString('fr-FR', {weekday:'long', day:'2-digit', month:'long'});
    const timeStr = now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('updateTime').textContent = dateStr + ' à ' + timeStr;
    document.getElementById('updateBanner').style.display = 'flex';
    document.getElementById('lastUpdate').textContent = '';

    renderRanking();
  } catch(e) {
    document.getElementById('rankingContainer').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>Erreur de chargement. Réessaie.</p></div>';
  }

  btn.classList.remove('spinning');
}

function renderRanking() {
  const container = document.getElementById('rankingContainer');

  if (!allScores.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>Aucun participant pour l\'instant.<br>Le classement apparaîtra dès les premiers pronostics.</p></div>';
    return;
  }

  let sorted = [...allScores];
  if (currentPhase === '1') sorted.sort((a,b) => b.points_phase1 - a.points_phase1);
  else if (currentPhase === '2') sorted.sort((a,b) => b.points_phase2 - a.points_phase2);
  else sorted.sort((a,b) => b.total_points - a.total_points);

  const getScore = s => currentPhase === '1' ? s.points_phase1 : currentPhase === '2' ? s.points_phase2 : s.total_points;
  const getInitials = name => name.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2);

  // PODIUM (top 3)
  let podiumHTML = '<div class="podium">';
  const podiumOrder = sorted.length >= 2 ? [sorted[1], sorted[0], sorted[2]].filter(Boolean) : sorted.slice(0,3);
  const posLabels = sorted.length >= 2 ? ['🥈','🥇','🥉'] : ['🥇','🥈','🥉'];
  const barClasses = sorted.length >= 2 ? ['p2','p1','p3'] : ['p1','p2','p3'];

  podiumOrder.forEach((s, i) => {
    if (!s) return;
    podiumHTML += `
      <div class="podium-item">
        <div class="podium-avatar">${getInitials(s.pseudo)}</div>
        <div class="podium-name">${s.pseudo}</div>
        <div class="podium-pts">${getScore(s)} pts</div>
        <div class="podium-bar ${barClasses[i]}">${posLabels[i]}</div>
      </div>`;
  });
  podiumHTML += '</div>';

  // LISTE complète
  let listHTML = '<div class="ranking-list">';
  sorted.forEach((s, i) => {
    const rank = i + 1;
    const numClass = rank===1?'top1':rank===2?'top2':rank===3?'top3':'';
    const rowClass = rank<=3?`rank-${rank}`:'';
    const pts = getScore(s);
    listHTML += `
      <div class="rank-row ${rowClass}" onclick="showDetail('${s.email}')">
        <div class="rank-num ${numClass}">${rank}</div>
        <div class="rank-pseudo">${s.pseudo}</div>
        <div class="rank-breakdown">
          <div class="rank-total">${pts} pts</div>
          <div class="rank-detail">${s.points_phase1}pts P1 · ${s.points_phase2}pts P2</div>
        </div>
        <div class="rank-chevron">›</div>
      </div>`;
  });
  listHTML += '</div>';

  container.innerHTML = podiumHTML + listHTML;
}

function showDetail(email) {
  const participant = allPronostics[email];
  // Try finding scoreData by email first, then by pseudo fallback
  let scoreData = allScores.find(s => s.email === email);
  if (!scoreData && participant) {
    scoreData = allScores.find(s => s.pseudo === participant.pseudo);
  }
  if (!participant || !scoreData) {
    alert('Pronostics non disponibles pour ce participant.');
    return;
  }

  const initials = scoreData.pseudo.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2);
  document.getElementById('detailAvatar').textContent = initials;
  document.getElementById('detailName').textContent = scoreData.pseudo;
  document.getElementById('detailScore').textContent = `${scoreData.total_points} pts total · ${scoreData.points_phase1} pts P1 · ${scoreData.points_phase2} pts P2`;

  const pronos = participant.pronos || {};
  let bodyHTML = '';
  let totalPts = 0, nb3 = 0, nb1 = 0, nb0 = 0;

  GROUPS.forEach(g => {
    let groupHTML = '';
    g.matches.forEach(m => {
      const prono = pronos[m.id];
      const reel = allResultats[m.id];
      if (!prono) return;

      const pronoH = prono.home !== '' && prono.home !== null ? prono.home : '?';
      const pronoA = prono.away !== '' && prono.away !== null ? prono.away : '?';
      const pronoScore = pronoH !== '?' || pronoA !== '?' ? `${pronoH}-${pronoA}` : '—';
      const pronoRes = prono.result || '?';

      let pts = 0, matchClass = 'pending', ptsClass = 'pending', ptsLabel = '⏳';
      let reelScore = '—';

      if (reel && reel.home_score !== null) {
        reelScore = `${reel.home_score}-${reel.away_score}`;
        const pH = parseInt(prono.home), pA = parseInt(prono.away);
        if (!isNaN(pH) && !isNaN(pA) && pH === reel.home_score && pA === reel.away_score) {
          pts = 3; matchClass = 'won3'; ptsClass = 'pts3'; ptsLabel = '+3'; nb3++;
        } else if (prono.result === reel.result) {
          pts = 1; matchClass = 'won1'; ptsClass = 'pts1'; ptsLabel = '+1'; nb1++;
        } else {
          pts = 0; matchClass = 'lost'; ptsClass = 'pts0'; ptsLabel = '0'; nb0++;
        }
        totalPts += pts;
      }

      groupHTML += `<div class="detail-match ${matchClass}">
        <div class="detail-teams">${m.home} vs ${m.away}</div>
        <div class="detail-prono">${pronoScore} [${pronoRes}]</div>
        <div class="detail-reel">${reelScore}</div>
        <div class="detail-pts ${ptsClass}">${ptsLabel}</div>
      </div>`;
    });

    if (groupHTML) {
      bodyHTML += `<div class="detail-group">
        <div class="detail-group-title"><div class="detail-group-letter">${g.letter}</div>Groupe ${g.letter}</div>
        ${groupHTML}
      </div>`;
    }
  });

  document.getElementById('detailBody').innerHTML = bodyHTML || '<p style="color:#5a7a9a;font-size:13px;padding:10px">Aucun pronostic trouvé.</p>';
  document.getElementById('detailSummary').innerHTML = `
    <div class="detail-sum-item"><div class="detail-sum-val" style="color:#d4af37">${nb3}</div><div class="detail-sum-lbl">Scores exacts</div></div>
    <div class="detail-sum-item"><div class="detail-sum-val" style="color:#2ea55a">${nb1}</div><div class="detail-sum-lbl">Bons résultats</div></div>
    <div class="detail-sum-item"><div class="detail-sum-val" style="color:#3a5a7a">${nb0}</div><div class="detail-sum-lbl">Ratés</div></div>
    <div class="detail-sum-item"><div class="detail-sum-val">${scoreData.total_points}</div><div class="detail-sum-lbl">Points total</div></div>
  `;

  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
}

// Chargement initial + refresh automatique toutes les 5 min
loadClassement();
setInterval(loadClassement, 5 * 60 * 1000);
document.getElementById('detailOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});
</script>
</body>
