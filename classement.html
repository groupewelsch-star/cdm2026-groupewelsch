<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Classement CDM 2026 – Groupe Welsch</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a1628; color: #e8edf5; min-height: 100vh; }

  .hero { background: linear-gradient(135deg, #0a1628 0%, #1a3a6b 50%, #0a1628 100%); border-bottom: 3px solid #d4af37; padding: 24px 20px 18px; text-align: center; }
  .hero-badge { display: inline-block; background: #d4af37; color: #0a1628; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 4px 14px; border-radius: 20px; margin-bottom: 8px; }
  .hero-brand { font-size: clamp(20px, 5vw, 28px); font-weight: 900; color: #fff; margin-bottom: 2px; }
  .hero h1 { font-size: 13px; color: #8ba0bf; }
  .last-update { font-size: 11px; color: #5a7a9a; margin-top: 6px; }

  .update-banner { display: flex; align-items: center; justify-content: center; gap: 8px; background: #0a1628; border: 1px solid #1e3356; border-radius: 10px; margin: 12px 16px 0; padding: 9px 16px; font-size: 12px; color: #8ba0bf; }
  .update-dot { width: 7px; height: 7px; border-radius: 50%; background: #2ea55a; flex-shrink: 0; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .update-time { font-weight: 700; color: #d4af37; }

  .phase-tabs { display: flex; justify-content: center; gap: 8px; padding: 14px 20px; background: #0f1e35; border-bottom: 1px solid #1e3356; }
  .tab { background: #1a2f50; border: 1px solid #2a4a7a; color: #8ba0bf; font-size: 13px; font-weight: 600; border-radius: 20px; padding: 6px 18px; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
  .tab.active { background: #d4af37; border-color: #d4af37; color: #0a1628; }

  .content { max-width: 500px; margin: 0 auto; padding: 16px; }

  /* PODIUM */
  .podium { display: flex; align-items: flex-end; justify-content: center; gap: 8px; margin-bottom: 24px; }
  .podium-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .podium-avatar { font-size: 22px; background: #1a2f50; border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; color: #fff; border: 2px solid #2a4a7a; }
  .podium-name { font-size: 11px; font-weight: 700; color: #e8edf5; text-align: center; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .podium-pts { font-size: 12px; font-weight: 700; color: #8ba0bf; }
  .podium-bar { border-radius: 6px 6px 0 0; width: 72px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .podium-bar.p1 { background: linear-gradient(180deg, #d4af37, #b8942e); height: 80px; }
  .podium-bar.p2 { background: linear-gradient(180deg, #9aa0a8, #6b7280); height: 60px; }
  .podium-bar.p3 { background: linear-gradient(180deg, #cd7f32, #a0622a); height: 44px; }

  /* CLASSEMENT TABLE */
  .ranking-list { display: flex; flex-direction: column; gap: 8px; }
  .rank-row { display: flex; align-items: center; gap: 12px; background: #0f1e35; border: 1px solid #1e3356; border-radius: 12px; padding: 12px 16px; transition: background 0.2s; }
  .rank-row.rank-1 { border-color: #d4af37; background: linear-gradient(90deg, rgba(212,175,55,0.08), #0f1e35); }
  .rank-row.rank-2 { border-color: #6b7280; }
  .rank-row.rank-3 { border-color: #cd7f32; }
  .rank-num { font-size: 16px; font-weight: 900; color: #3a5a7a; min-width: 28px; text-align: center; }
  .rank-num.top1 { color: #d4af37; }
  .rank-num.top2 { color: #9aa0a8; }
  .rank-num.top3 { color: #cd7f32; }
  .rank-pseudo { flex: 1; font-size: 15px; font-weight: 700; color: #fff; }
  .rank-breakdown { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .rank-total { font-size: 18px; font-weight: 900; color: #d4af37; }
  .rank-detail { font-size: 10px; color: #5a7a9a; }

  /* PHASE BADGES */
  .phase-badge { display: inline-block; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
  .phase-badge.p1 { background: rgba(29,158,117,0.2); color: #7fdc9f; border: 1px solid rgba(29,158,117,0.3); }
  .phase-badge.p2 { background: rgba(212,175,55,0.2); color: #d4af37; border: 1px solid rgba(212,175,55,0.3); }

  .empty-state { text-align: center; padding: 40px 20px; color: #3a5a7a; }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  .loading { text-align: center; padding: 40px; color: #5a7a9a; }
  .spinner { width: 32px; height: 32px; border: 3px solid #1e3356; border-top-color: #d4af37; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .refresh-btn { position: fixed; bottom: 20px; right: 20px; background: #d4af37; color: #0a1628; border: none; border-radius: 50%; width: 48px; height: 48px; font-size: 20px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.4); z-index: 100; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: center; }
  .refresh-btn.spinning { animation: spin 0.8s linear infinite; }

  .ext-links {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 12px 16px;
    background: #0a1628;
    border-bottom: 1px solid #1e3356;
    flex-wrap: wrap;
  }
  .ext-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #0f1e35;
    border: 1px solid #2a4a7a;
    color: #8ba0bf;
    font-size: 12px;
    font-weight: 600;
    border-radius: 20px;
    padding: 7px 14px;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.2s;
  }
  .ext-btn:active { opacity: 0.75; }
  .ext-btn.primary { background: #1a3a6b; border-color: #2a5a9b; color: #7fafd9; }

  .stats-bar { display: flex; justify-content: center; gap: 20px; padding: 12px 20px; background: #0f1e35; border-bottom: 1px solid #1e3356; margin-bottom: 0; }
  .stat { text-align: center; }
  .stat-val { font-size: 18px; font-weight: 900; color: #d4af37; }
  .stat-lbl { font-size: 10px; color: #5a7a9a; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">🏆 Classement en direct</div>
  <div class="hero-brand">Groupe Welsch</div>
  <h1>Coupe du Monde 2026</h1>
  <div class="last-update" id="lastUpdate">Chargement...</div>
</div>

<div class="update-banner" id="updateBanner" style="display:none"><div class="update-dot"></div><span>Dernière mise à jour du classement : <span class="update-time" id="updateTime"></span></span></div>

<div class="ext-links">
  <a class="ext-btn primary" href="https://www.flashscore.fr/football/monde/championnat-du-monde/" target="_blank">⚽ Scores live · Flashscore</a>
  <a class="ext-btn" href="https://www.footmercato.net/international/coupe-du-monde/calendrier/" target="_blank">📅 Calendrier · Footmercato</a>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-val" id="statParticipants">—</div><div class="stat-lbl">Participants</div></div>
  <div class="stat"><div class="stat-val" id="statMatchsJoues">—</div><div class="stat-lbl">Matchs joués</div></div>
  <div class="stat"><div class="stat-val" id="statLeader">—</div><div class="stat-lbl">Meilleur score</div></div>
</div>

<div class="phase-tabs">
  <button class="tab active" onclick="setPhase('total')">🌍 Total</button>
  <button class="tab" onclick="setPhase('1')">Phase 1</button>
  <button class="tab" onclick="setPhase('2')">Phase 2</button>
</div>

<div class="content">
  <div id="rankingContainer"><div class="loading"><div class="spinner"></div><p>Chargement du classement...</p></div></div>
</div>

<button class="refresh-btn" id="refreshBtn" onclick="loadClassement()" title="Actualiser">↻</button>

<script>
const SUPABASE_URL = 'https://fafqylzoegiuvzqjfeea.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhZnF5bHpvZWdpdXZ6cWpmZWVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNzQxMDQsImV4cCI6MjA5Njc1MDEwNH0.T3YxIsSMTyVoXvcM2jq5cPWBPGuUVKY8Ss4vvLyLzd8';

let currentPhase = 'total';
let allScores = [];

function setPhase(p) {
  currentPhase = p;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['total','1','2'][i] === p);
  });
  renderRanking();
}

async function loadClassement() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/scores?order=total_points.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    allScores = await res.json();

    // Stats
    document.getElementById('statParticipants').textContent = allScores.length;
    const maxPts = allScores.length > 0 ? Math.max(...allScores.map(s => s.total_points)) : 0;
    document.getElementById('statLeader').textContent = maxPts + ' pts';

    // Résultats joués
    const resMatchs = await fetch(`${SUPABASE_URL}/rest/v1/resultats?select=id&home_score=not.is.null`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const matchsData = await resMatchs.json();
    document.getElementById('statMatchsJoues').textContent = Array.isArray(matchsData) ? matchsData.length : 0;

    const now = new Date();
    const dateStr = now.toLocaleDateString('fr-FR', {weekday:'long', day:'2-digit', month:'long'});
    const timeStr = now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('updateTime').textContent = dateStr + ' à ' + timeStr;
    document.getElementById('updateBanner').style.display = 'flex';
    document.getElementById('lastUpdate').textContent = '';

    renderRanking();
  } catch(e) {
    document.getElementById('rankingContainer').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>Erreur de chargement. Réessaie.</p></div>';
  }

  btn.classList.remove('spinning');
}

function renderRanking() {
  const container = document.getElementById('rankingContainer');

  if (!allScores.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>Aucun participant pour l\'instant.<br>Le classement apparaîtra dès les premiers pronostics.</p></div>';
    return;
  }

  let sorted = [...allScores];
  if (currentPhase === '1') sorted.sort((a,b) => b.points_phase1 - a.points_phase1);
  else if (currentPhase === '2') sorted.sort((a,b) => b.points_phase2 - a.points_phase2);
  else sorted.sort((a,b) => b.total_points - a.total_points);

  const getScore = s => currentPhase === '1' ? s.points_phase1 : currentPhase === '2' ? s.points_phase2 : s.total_points;
  const getInitials = name => name.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2);

  // PODIUM (top 3)
  let podiumHTML = '<div class="podium">';
  const podiumOrder = sorted.length >= 2 ? [sorted[1], sorted[0], sorted[2]].filter(Boolean) : sorted.slice(0,3);
  const posLabels = sorted.length >= 2 ? ['🥈','🥇','🥉'] : ['🥇','🥈','🥉'];
  const barClasses = sorted.length >= 2 ? ['p2','p1','p3'] : ['p1','p2','p3'];

  podiumOrder.forEach((s, i) => {
    if (!s) return;
    podiumHTML += `
      <div class="podium-item">
        <div class="podium-avatar">${getInitials(s.pseudo)}</div>
        <div class="podium-name">${s.pseudo}</div>
        <div class="podium-pts">${getScore(s)} pts</div>
        <div class="podium-bar ${barClasses[i]}">${posLabels[i]}</div>
      </div>`;
  });
  podiumHTML += '</div>';

  // LISTE complète
  let listHTML = '<div class="ranking-list">';
  sorted.forEach((s, i) => {
    const rank = i + 1;
    const numClass = rank===1?'top1':rank===2?'top2':rank===3?'top3':'';
    const rowClass = rank<=3?`rank-${rank}`:'';
    const pts = getScore(s);
    listHTML += `
      <div class="rank-row ${rowClass}">
        <div class="rank-num ${numClass}">${rank}</div>
        <div class="rank-pseudo">${s.pseudo}</div>
        <div class="rank-breakdown">
          <div class="rank-total">${pts} pts</div>
          <div class="rank-detail">${s.points_phase1}pts P1 · ${s.points_phase2}pts P2</div>
        </div>
      </div>`;
  });
  listHTML += '</div>';

  container.innerHTML = podiumHTML + listHTML;
}

// Chargement initial + refresh automatique toutes les 5 min
loadClassement();
setInterval(loadClassement, 5 * 60 * 1000);
</script>
</body>
</html>
