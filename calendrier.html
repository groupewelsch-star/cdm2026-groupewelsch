<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📅 Calendrier – Groupe Welsch</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a1628; color: #e8edf5; min-height: 100vh; }

  .nav-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: #070f1e; border-bottom: 1px solid #1e3356; }
  .nav-logo { font-size: 13px; font-weight: 700; color: #d4af37; }
  .nav-menu-btn { display: flex; align-items: center; gap: 6px; background: #1a2f50; border: 1px solid #2a4a7a; color: #8ba0bf; font-size: 12px; font-weight: 600; border-radius: 20px; padding: 7px 14px; text-decoration: none; -webkit-tap-highlight-color: transparent; }
  .nav-menu-btn:active { opacity: 0.75; }

  .hero { background: linear-gradient(135deg, #0a1628 0%, #1a3a6b 50%, #0a1628 100%); border-bottom: 3px solid #d4af37; padding: 22px 20px 16px; text-align: center; }
  .hero-brand { font-size: clamp(18px, 4vw, 24px); font-weight: 900; color: #fff; margin-bottom: 2px; }
  .hero-sub { font-size: 12px; color: #8ba0bf; }

  .content { max-width: 580px; margin: 0 auto; padding: 16px 16px 40px; }

  .day-block { margin-bottom: 18px; }
  .day-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #5a7a9a; margin-bottom: 8px; padding-left: 4px; }

  .match-card { display: flex; align-items: center; gap: 10px; background: #0f1e35; border: 1px solid #1e3356; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.15s; }
  .match-card:active { background: #162b47; }
  .match-card.played { border-color: #2a4a7a; }

  .match-group-tag { background: #d4af37; color: #0a1628; font-weight: 900; font-size: 10px; width: 22px; height: 22px; border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .match-info { flex: 1; min-width: 0; }
  .match-teams { font-size: 13px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 5px; }
  .match-teams .vs { font-size: 10px; color: #5a7a9a; font-weight: 600; }

  .match-score-zone { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
  .match-score { font-size: 16px; font-weight: 900; color: #d4af37; }
  .match-score.pending { font-size: 11px; color: #3a5a7a; font-weight: 600; }
  .match-pts { font-size: 10px; color: #5a7a9a; font-weight: 600; }
  .match-pts strong { color: #2ea55a; }

  .match-chevron { font-size: 16px; color: #3a5a7a; flex-shrink: 0; }

  .sticky-header { position: sticky; top: 0; z-index: 50; }
  .phase-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #1a2f50; border: 1px solid #2a4a7a; border-radius: 12px; cursor: pointer; margin-bottom: 10px; -webkit-tap-highlight-color: transparent; user-select: none; }
  .phase-header.active { background: linear-gradient(90deg, rgba(212,175,55,0.15), #1a2f50); border-color: #d4af37; }
  .phase-header-title { font-size: 14px; font-weight: 700; color: #fff; }
  .phase-header-sub { font-size: 11px; color: #8ba0bf; margin-top: 2px; }
  .phase-header-chevron { font-size: 16px; color: #5a7a9a; transition: transform 0.2s; }
  .phase-header-chevron.open { transform: rotate(90deg); }
  .phase-body { display: none; }
  .phase-body.open { display: block; }
  .match-participation { font-size: 11px; color: #5a7a9a; margin-top: 4px; }
  .match-participation strong { color: #2ea55a; }
  .match-participation.warn strong { color: #e07070; }

  /* PARTICIPATION MODAL */
  .part-overlay { display: none; position: fixed; inset: 0; background: rgba(5,12,25,0.95); z-index: 200; overflow-y: auto; padding: 16px; }
  .part-overlay.open { display: block; }
  .part-modal { background: #0f1e35; border: 2px solid #d4af37; border-radius: 16px; max-width: 500px; margin: 0 auto; overflow: hidden; }
  .part-header { background: linear-gradient(135deg, #0a1628, #1a3a6b); padding: 16px 20px; border-bottom: 2px solid #d4af37; display: flex; align-items: center; justify-content: space-between; }
  .part-header-left h2 { font-size: 16px; font-weight: 900; color: #fff; }
  .part-header-left p { font-size: 12px; color: #8ba0bf; margin-top: 2px; }
  .part-close { background: #1a2f50; border: 1px solid #2a4a7a; color: #8ba0bf; border-radius: 8px; width: 32px; height: 32px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .part-body { padding: 16px; max-height: 65vh; overflow-y: auto; }
  .part-section-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; margin-top: 14px; }
  .part-section-title.done { color: #2ea55a; }
  .part-section-title.missing { color: #e07070; }
  .part-person { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: #0a1628; border: 1px solid #162b47; border-radius: 8px; margin-bottom: 4px; font-size: 13px; font-weight: 600; color: #fff; }
  .part-person .prono-detail { font-size: 11px; color: #8ba0bf; margin-left: auto; }
  .part-person.missing-person { color: #5a7a9a; border-color: #1e3356; }
  .part-avatar { width: 28px; height: 28px; border-radius: 50%; background: #1a2f50; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; color: #d4af37; flex-shrink: 0; }
  .part-avatar.missing-avatar { color: #3a5a7a; }

  .loading { text-align: center; padding: 40px; color: #5a7a9a; }
  .spinner { width: 32px; height: 32px; border: 3px solid #1e3356; border-top-color: #d4af37; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

    {id:'J3',date:'22 juin',home:'Argentine',away:'Autriche'},{id:'J4',date:'23 juin',home:'Jordanie',away:'Algérie'},
    {id:'J5',date:'28 juin',home:'Algérie',away:'Autriche'},{id:'J6',date:'28 juin',home:'Jordanie',away:'Argentine'}]},
  { letter:'K', matches:[
    {id:'K1',date:'17 juin',home:'Portugal',away:'RD Congo'},{id:'K2',date:'18 juin',home:'Ouzbékistan',away:'Colombie'},
    {id:'K3',date:'23 juin',home:'Portugal',away:'Ouzbékistan'},{id:'K4',date:'24 juin',home:'Colombie',away:'RD Congo'},
    {id:'K5',date:'28 juin',home:'Colombie',away:'Portugal'},{id:'K6',date:'28 juin',home:'RD Congo',away:'Ouzbékistan'}]},
  { letter:'L', matches:[
    {id:'L1',date:'17 juin',home:'Angleterre',away:'Croatie'},{id:'L2',date:'18 juin',home:'Ghana',away:'Panama'},
    {id:'L3',date:'23 juin',home:'Angleterre',away:'Ghana'},{id:'L4',date:'24 juin',home:'Panama',away:'Croatie'},
    {id:'L5',date:'27 juin',home:'Panama',away:'Angleterre'},{id:'L6',date:'27 juin',home:'Croatie',away:'Ghana'}]}
];

const DATE_ORDER = ['11 juin','12 juin','13 juin','14 juin','15 juin','16 juin','17 juin','18 juin','19 juin','20 juin','21 juin','22 juin','23 juin','24 juin','25 juin','26 juin','27 juin','28 juin','29 juin','30 juin'];

const MATCHES_P2 = [
  {id:'R1_1',  date:'28 juin',  home:'Afrique du Sud', away:'Canada',      group:'16'},
  {id:'R1_14', date:'29 juin',  home:'Brésil',          away:'Japon',       group:'16'},
  {id:'R1_10', date:'29 juin',  home:'Allemagne',       away:'Paraguay',    group:'16'},
  {id:'R1_2',  date:'30 juin',  home:'Pays-Bas',        away:'Maroc',       group:'16'},
  {id:'R1_3',  date:'30 juin',  home:"Côte d'Ivoire",   away:'Norvège',     group:'16'},
  {id:'R1_4',  date:'30 juin',  home:'France',          away:'Suède',       group:'16'},
  {id:'R1_7',  date:'1 juil.', home:'Mexique',         away:'Équateur',    group:'16'},
  {id:'R1_6',  date:'1 juil.', home:'Angleterre',      away:'RD Congo',    group:'16'},
  {id:'R1_5',  date:'1 juil.', home:'Belgique',        away:'Sénégal',     group:'16'},
  {id:'R1_8',  date:'2 juil.', home:'États-Unis',      away:'Bosnie',      group:'16'},
  {id:'R1_9',  date:'2 juil.', home:'Espagne',         away:'Autriche',    group:'16'},
  {id:'R1_13', date:'3 juil.', home:'Portugal',        away:'Croatie',     group:'16'},
  {id:'R1_11', date:'3 juil.', home:'Suisse',          away:'Algérie',     group:'16'},
  {id:'R1_12', date:'3 juil.', home:'Australie',       away:'Égypte',      group:'16'},
  {id:'R1_16', date:'4 juil.', home:'Argentine',       away:'Cap-Vert',    group:'16'},
  {id:'R1_15', date:'4 juil.', home:'Colombie',        away:'Ghana',       group:'16'},
];

const DATE_ORDER_P2 = ['28 juin','29 juin','30 juin','1 juil.','2 juil.','3 juil.','4 juil.','5 juil.','6 juil.','7 juil.','8 juil.'];

function buildMatchList() {
  const list = [];
  GROUPS.forEach(g => {
    g.matches.forEach(m => {
      list.push({ ...m, group: g.letter });
    });
  });
  list.sort((a, b) => DATE_ORDER.indexOf(a.date) - DATE_ORDER.indexOf(b.date));
  return list;
}

function buildMatchListP2() {
  return [...MATCHES_P2].sort((a,b) => DATE_ORDER_P2.indexOf(a.date) - DATE_ORDER_P2.indexOf(b.date));
}

async function loadCalendar() {
  const container = document.getElementById('calendarContainer');

  try {
    const _h = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };
    const [resResultats, resP1, resP2, resScores] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/resultats`, { headers: _h }),
      fetch(`${SUPABASE_URL}/rest/v1/pronostics?phase=eq.1`, { headers: _h }),
      fetch(`${SUPABASE_URL}/rest/v1/pronostics?phase=eq.2`, { headers: _h }),
      fetch(`${SUPABASE_URL}/rest/v1/scores?select=pseudo,email`, { headers: _h })
    ]);
    const resultatsData = await resResultats.json();
    const pronosticsData = await resP1.json();
    const pronosticsData2 = await resP2.json();
    const scoresData = await resScores.json();

    const resultatsByMatch = {};
    resultatsData.forEach(r => { resultatsByMatch[r.match_id] = r; });

    sessionStorage.setItem('cdm_resultats', JSON.stringify(resultatsByMatch));
    sessionStorage.setItem('cdm_pronostics', JSON.stringify(pronosticsData));
    window._allPronostics = pronosticsData;
    window._allPronostics2 = pronosticsData2;
    window._allResultats = resultatsByMatch;
    window._allScores = [];
    try {
      const scRes = await fetch(`${SUPABASE_URL}/rest/v1/scores?select=pseudo,email`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
      window._allScores = await scRes.json();
    } catch(e) {}

    const matchList = buildMatchList();
    let currentDate = null;
    let html = '';

    matchList.forEach(m => {
      if (m.date !== currentDate) {
        if (currentDate !== null) html += '</div>';
        currentDate = m.date;
        html += `<div class="day-block"><div class="day-title">${m.date}</div>`;
      }

      const reel = resultatsByMatch[m.id];
      const isDone = reel && reel.home_score !== null && reel.home_score !== undefined;

      let totalPts = 0;
      if (isDone) {
        pronosticsData.forEach(p => {
          const prono = (p.pronos || {})[m.id];
          if (!prono) return;
          const pH = parseInt(prono.home), pA = parseInt(prono.away);
          if (!isNaN(pH) && !isNaN(pA) && pH === reel.home_score && pA === reel.away_score) {
            totalPts += 3;
          } else if (prono.result && prono.result === reel.result) {
            totalPts += 1;
          }
        });
      }

      const scoreHTML = isDone
        ? `<div class="match-score">${reel.home_score}-${reel.away_score}</div><div class="match-pts">Total : <strong>${totalPts} pts</strong></div>`
        : `<div class="match-score pending">⏳ À venir</div>`;

      html += `<div class="match-card ${isDone?'played':''}" onclick="goToMatch('${m.id}')">
        <div class="match-group-tag">${m.group}</div>
        <div class="match-info">
          <div class="match-teams">${m.home} <span class="vs">vs</span> ${m.away}</div>
        </div>
        <div class="match-score-zone">${scoreHTML}</div>
        <div class="match-chevron">›</div>
      </div>`;
    });

    html += '</div>';
    // Split into phase 1 (groups) and phase 2 (16es+)
    const p1Matches = matchList.filter(m => !m.id.startsWith('R'));
    const p2Matches = matchList.filter(m => m.id.startsWith('R'));

    function buildPhaseHTML(matches) {
      let phaseHTML = '';
      let currentDate = null;
      matches.forEach(m => {
        if (m.date !== currentDate) {
          if (currentDate !== null) phaseHTML += '</div>';
          currentDate = m.date;
          phaseHTML += `<div class="day-block"><div class="day-title">${m.date}</div>`;
        }
        const reel = resultatsByMatch[m.id];
        const isDone = reel && reel.home_score !== null && reel.home_score !== undefined;
        let totalPts = 0;
        if (isDone) {
          pronosticsData.forEach(p => {
            const prono = (p.pronos || {})[m.id];
            if (!prono) return;
            const pH = parseInt(prono.home), pA = parseInt(prono.away);
            if (!isNaN(pH) && !isNaN(pA) && pH === reel.home_score && pA === reel.away_score) totalPts += 3;
            else if (prono.result && prono.result === reel.result) totalPts += 1;
          });
        }
        const scoreHTML = isDone
          ? `<div class="match-score">${reel.home_score}-${reel.away_score}</div><div class="match-pts">Total : <strong>${totalPts} pts</strong></div>`
          : `<div class="match-score pending">⏳ À venir</div>`;
        // Count participants who pronosticated this match
        const isP2match = m.id.startsWith('R');
        let nbPronos = 0;
        const pronosToCheck = isP2match ? pronosticsData2 : pronosticsData;
        pronosToCheck.forEach(p => {
          const prono = (p.pronos || {})[m.id];
          if (prono && prono.result) nbPronos++;
        });
        const totalParticipants = window._allScores ? window._allScores.length : '?';
        const partClass = nbPronos < totalParticipants ? 'warn' : '';
        const partHTML = `<div class="match-participation ${partClass}"><strong>${nbPronos}</strong>/${totalParticipants} pronostics</div>`;

        phaseHTML += `<div class="match-card ${isDone?'played':''}">
          <div class="match-group-tag" onclick="goToMatch('${m.id}')">${m.group || '16'}</div>
          <div class="match-info" onclick="goToMatch('${m.id}')">
            <div class="match-teams">${m.home} <span class="vs">vs</span> ${m.away}</div>
            ${partHTML}
          </div>
          <div class="match-score-zone" onclick="showParticipation('${m.id}','${m.home} vs ${m.away}',${isP2match ? 2 : 1})">
            ${scoreHTML}
          </div>
          <div class="match-chevron" onclick="showParticipation('${m.id}','${m.home} vs ${m.away}',${isP2match ? 2 : 1})">›</div>
        </div>`;
      });
      if (currentDate) phaseHTML += '</div>';
      return phaseHTML;
    }

    // Phase 1 = groupes A-L (from matchList)
    // Phase 2 = 16es (from MATCHES_P2 directly, always shown even without scores)
    const p2MatchesSorted = [...MATCHES_P2].sort((a,b) => DATE_ORDER_P2.indexOf(a.date) - DATE_ORDER_P2.indexOf(b.date));
    const p1HTML = buildPhaseHTML(p1Matches);
    const p2HTML = buildPhaseHTML(p2MatchesSorted);

    container.innerHTML = `
      <div class="phase-header active" onclick="togglePhase('p2')">
        <div><div class="phase-header-title">⚡ Phase finale · 16es de finale</div><div class="phase-header-sub">Matchs en cours</div></div>
        <span class="phase-header-chevron open" id="chevron_p2">›</span>
      </div>
      <div class="phase-body open" id="body_p2">${p2HTML || '<p style="color:#5a7a9a;font-size:13px;padding:10px 0">Aucun match de phase finale enregistré.</p>'}</div>

      <div class="phase-header" onclick="togglePhase('p1')" style="margin-top:16px">
        <div><div class="phase-header-title">⚽ Phase de poules</div><div class="phase-header-sub">Terminée · Cliquer pour voir le détail</div></div>
        <span class="phase-header-chevron" id="chevron_p1">›</span>
      </div>
      <div class="phase-body" id="body_p1">${p1HTML}</div>
    `;

  } catch(e) {
    container.innerHTML = '<p style="color:#5a7a9a;text-align:center;padding:40px">Erreur de chargement. Réessaie.</p>';
  }
}

function togglePhase(id) {
  document.getElementById('body_' + id).classList.toggle('open');
  document.getElementById('chevron_' + id).classList.toggle('open');
}

function goToMatch(matchId) {
  window.location.href = `match-detail.html?id=${matchId}`;
}

function showParticipation(matchId, matchTitle, phase) {
  const allPronostics = phase === 2 ? (window._allPronostics2 || []) : (window._allPronostics || []);
  console.log('showParticipation phase:', phase, 'pronos count:', allPronostics.length, 'scores count:', (window._allScores||[]).length);
  const allScores = window._allScores || [];
  const reel = (window._allResultats || {})[matchId];

  document.getElementById('partMatchTitle').textContent = matchTitle;
  document.getElementById('partMatchSub').textContent = phase === 2 ? '16es de finale' : 'Phase de poules';

  const withProno = [];
  const withoutProno = [];

  allScores.forEach(s => {
    const pData = allPronostics.find(p => p.email === s.email && p.phase === phase);
    const prono = pData ? (pData.pronos || {})[matchId] : null;
    if (prono && prono.result) {
      const h = prono.home !== '' ? prono.home : '?';
      const a = prono.away !== '' ? prono.away : '?';
      const score = (h !== '?' || a !== '?') ? `${h}-${a}` : '';
      withProno.push({ pseudo: s.pseudo, prono: `${score} [${prono.result}]` });
    } else {
      withoutProno.push({ pseudo: s.pseudo });
    }
  });

  const initials = name => name.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2);

  let html = '';
  if (withProno.length) {
    html += `<div class="part-section-title done">✅ Ont pronostiqué (${withProno.length})</div>`;
    withProno.forEach(p => {
      html += `<div class="part-person">
        <div class="part-avatar">${initials(p.pseudo)}</div>
        ${p.pseudo}
        <span class="prono-detail">${p.prono}</span>
      </div>`;
    });
  }
  if (withoutProno.length) {
    html += `<div class="part-section-title missing">❌ N'ont pas encore pronostiqué (${withoutProno.length})</div>`;
    withoutProno.forEach(p => {
      html += `<div class="part-person missing-person">
        <div class="part-avatar missing-avatar">${initials(p.pseudo)}</div>
        ${p.pseudo}
      </div>`;
    });
  }

  document.getElementById('partBody').innerHTML = html || '<p style="color:#5a7a9a;font-size:13px">Aucune donnée.</p>';
  document.getElementById('partOverlay').classList.add('open');
}

function closePart() {
  document.getElementById('partOverlay').classList.remove('open');
}

loadCalendar();
document.getElementById('partOverlay').addEventListener('click', function(e) {
  if (e.target === this) closePart();
});
</script>
</body>
</html>
